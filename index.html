<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Khazna - Libyan Media Assets</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap"></noscript>

    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Google tag (gtag.js) — deferred until after load to keep it off the critical path -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-5F4YQHKRJL');
      (function () {
        function loadGtag() {
          var s = document.createElement('script');
          s.async = true;
          s.src = 'https://www.googletagmanager.com/gtag/js?id=G-5F4YQHKRJL';
          document.head.appendChild(s);
        }
        if ('requestIdleCallback' in window) {
          requestIdleCallback(loadGtag, { timeout: 4000 });
        } else {
          window.addEventListener('load', function () { setTimeout(loadGtag, 1500); });
        }
      })();
    </script>

    <!-- FOUC prevention: apply theme + language before paint -->
    <script>
      (() => {
        var theme = localStorage.getItem('khazna-theme');
        if (!theme) {
          theme = window.matchMedia?.('(prefers-color-scheme: dark)').matches
            ? 'dark'
            : 'light';
        }
        var lang = localStorage.getItem('khazna-lang') || 'ar';
        if (theme === 'dark') document.documentElement.classList.add('dark');
        document.documentElement.lang = lang;
        document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
      })();
    </script>
</head>
  <body class="bg-background text-primary font-sans antialiased">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
